<!DOCTYPE html>
<html lang="zh-TW">

<head>

  <meta charset="UTF-8">
  <meta name="author" content="Starle">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starle Web — 三體模擬</title>

  <link rel="icon" href="../../favicon.png" type="image/png">

  <link rel="stylesheet" href="./threebody.css">

  <!-- 模組依賴 (Three.js) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

</head>

<body>
  <!-- 使用者介面容器 -->
  <div class="ui-container">

    <!-- 頂部功能控制列 -->
     <div class="control-container">
      <span class="refresh-button">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </span>

      <span class="pause-button">
        <svg class="icon" id="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </span>
      <span class="setting-button">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.47.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.06-.47-.12-.61l-2.01-1.58z M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </span>
      <span class="home-button">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </span>
    </div>

    <!-- 設定參數面板 -->
    <div class="setting-panel">

      <!-- 頁籤切換導航 -->
      <div class="tab-header">
        <span class="value-button show">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
          </svg>
        </span>
        <span class="solution-button">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 15.18V7c0-2.21-1.79-4-4-4s-4 1.79-4 4v10c0 1.1-.9 2-2 2s-2-.9-2-2V8.82C8.16 8.4 9 7.3 9 6c0-1.66-1.34-3-3-3S3 4.34 3 6c0 1.3.84 2.4 2 2.82V17c0 2.21 1.79 4 4 4s4-1.79 4-4V7c0-1.1.9-2 2-2s2 .9 2 2v8.18A2.996 2.996 0 0 0 18 21c1.66 0 3-1.34 3-3c0-1.3-.84-2.4-2-2.82z"/>
          </svg>
        </span>
        <span class="analyze-button">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.74 18.33A9.984 9.984 0 0 0 22 12c0-5.52-4.48-10-10-10S2 6.48 2 12s4.48 10 10 10a9.984 9.984 0 0 0 7.11-2.97c.03-.03.05-.06.07-.08c.2-.2.39-.41.56-.62zM12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8s8 3.59 8 8c0 1.85-.63 3.54-1.69 4.9l-1.43-1.43c.69-.98 1.1-2.17 1.1-3.46c0-3.31-2.69-6-6-6s-6 2.69-6 6s2.69 6 6 6c1.3 0 2.51-.42 3.49-1.13l1.42 1.42A7.822 7.822 0 0 1 12 20zm1.92-7.49c.17-.66.02-1.38-.49-1.9l-.02-.02c-.77-.77-2-.78-2.78-.04c-.01.01-.03.02-.05.04c-.78.78-.78 2.05 0 2.83l.02.02c.52.51 1.25.67 1.91.49l1.51 1.51c-.6.36-1.29.58-2.04.58c-2.21 0-4-1.79-4-4s1.79-4 4-4s4 1.79 4 4c0 .73-.21 1.41-.56 2l-1.5-1.51z"/>
          </svg>
        </span>
      </div>

      <!-- 分頁：參數調整 -->
      <div class="value-tab active">
        <h4>參數調整</h4>

        <div class="input-container">
          <label for="line-input">軌跡時長</label>
          <div class="range-wrapper">
            <input type="range" id="point-time-input" min="0" max="60" step="1">
            <span class="range-tooltip">0</span>
          </div>
        </div>

        <div class="input-container">
          <label for="star1-mass-input">橘星質量</label>
          <input type="number" id="star1-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>橘星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star1-posX-input" step="0.1">
            <input type="number" id="star1-posY-input" step="0.1">
            <input type="number" id="star1-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>橘星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star1-velX-input" step="0.1">
            <input type="number" id="star1-velY-input" step="0.1">
            <input type="number" id="star1-velZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label for="star2-mass-input">藍星質量</label>
          <input type="number" id="star2-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>藍星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star2-posX-input" step="0.1">
            <input type="number" id="star2-posY-input" step="0.1">
            <input type="number" id="star2-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>藍星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star2-velX-input" step="0.1">
            <input type="number" id="star2-velY-input" step="0.1">
            <input type="number" id="star2-velZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label for="star3-mass-input">白星質量</label>
          <input type="number" id="star3-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>白星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star3-posX-input" step="0.1">
            <input type="number" id="star3-posY-input" step="0.1">
            <input type="number" id="star3-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>白星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star3-velX-input" step="0.1">
            <input type="number" id="star3-velY-input" step="0.1">
            <input type="number" id="star3-velZ-input" step="0.1">
          </div>
        </div>
        
      </div>

      <!-- 分頁：特殊解 -->
      <div class="solution-tab">
        <h4>特殊解</h4>
        <div class="solution-list"></div>
      </div>

      <!-- 分頁：數據監測 -->
      <div class="analyze-tab">
        <h4>數據監測</h4>
        <div class="data-card" style="border-left: 4px solid #ff6600;">
          <div class="data-title">橘星</div>
          <div class="data-row">Pos: <span id="monitor-s1-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s1-vel">0.000, 0.000, 0.000</span></div>
        </div>
        <div class="data-card" style="border-left: 4px solid #66ccff;">
          <div class="data-title">藍星</div>
          <div class="data-row">Pos: <span id="monitor-s2-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s2-vel">0.000, 0.000, 0.000</span></div>
        </div>
        <div class="data-card" style="border-left: 4px solid #fff0b3;">
          <div class="data-title">白星</div>
          <div class="data-row">Pos: <span id="monitor-s3-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s3-vel">0.000, 0.000, 0.000</span></div>
        </div>
      </div>

    </div>

  </div>

  <script type="module" src="./threebody.js"></script>

</body>

</html>
