<!DOCTYPE html>
<html lang="zh-TW">

<head>

  <!-- Meta 資訊設定 -->
  <meta charset="UTF-8">
  <meta name="author" content="Starle">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starle Web — 三體動畫</title>

  <!-- 樣式表與字體圖示 -->
  <link rel="stylesheet" href="./threebody.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- 模組依賴 (Three.js) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

</head>

<body>
  <!-- 使用者介面容器 -->
  <div class="ui-container">

    <!-- 頂部功能控制列 -->
     <div class="control-container">
      <span class="refresh-button">
        <span class="material-icons">refresh</span>
      </span>

      <span class="pause-button">
        <span class="material-icons">pause</span>
      </span>
      <span class="setting-button">
        <span class="material-icons">settings</span>
      </span>
      <span class="home-button">
        <span class="material-icons">home</span>
      </span>
    </div>

    <!-- 設定參數面板 -->
    <div class="setting-panel">

      <!-- 頁籤切換導航 -->
      <div class="tab-header">
        <span class="value-button show">
          <span class="material-icons">tune</span>
        </span>
        <span class="solution-button">
          <span class="material-icons">route</span>
        </span>
        <span class="analyze-button">
          <span class="material-icons">radar</span>
        </span>
      </div>

      <!-- 分頁：參數調整 -->
      <div class="value-tab active">
        <h4>參數調整</h4>

        <div class="input-container">
          <label for="line-input">軌跡時長</label>
          <div class="range-wrapper">
            <input type="range" id="point-time-input" min="0" max="60" step="1">
            <span class="range-tooltip">0</span>
          </div>
        </div>

        <div class="input-container">
          <label for="star1-mass-input">橘星質量</label>
          <input type="number" id="star1-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>橘星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star1-posX-input" step="0.1">
            <input type="number" id="star1-posY-input" step="0.1">
            <input type="number" id="star1-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>橘星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star1-velX-input" step="0.1">
            <input type="number" id="star1-velY-input" step="0.1">
            <input type="number" id="star1-velZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label for="star2-mass-input">藍星質量</label>
          <input type="number" id="star2-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>藍星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star2-posX-input" step="0.1">
            <input type="number" id="star2-posY-input" step="0.1">
            <input type="number" id="star2-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>藍星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star2-velX-input" step="0.1">
            <input type="number" id="star2-velY-input" step="0.1">
            <input type="number" id="star2-velZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label for="star3-mass-input">白星質量</label>
          <input type="number" id="star3-mass-input" step="0.1">
        </div>

        <div class="input-container">
          <label>白星座標</label>
          <div class="vector-inputs">
            <input type="number" id="star3-posX-input" step="0.1">
            <input type="number" id="star3-posY-input" step="0.1">
            <input type="number" id="star3-posZ-input" step="0.1">
          </div>
        </div>

        <div class="input-container">
          <label>白星初速</label>
          <div class="vector-inputs">
            <input type="number" id="star3-velX-input" step="0.1">
            <input type="number" id="star3-velY-input" step="0.1">
            <input type="number" id="star3-velZ-input" step="0.1">
          </div>
        </div>
        
      </div>

      <!-- 分頁：特殊解 -->
      <div class="solution-tab">
        <h4>特殊解</h4>
        <div class="solution-list"></div>
      </div>

      <!-- 分頁：數據監測 -->
      <div class="analyze-tab">
        <h4>數據監測</h4>
        <div class="data-card" style="border-left: 4px solid #ff6600;">
          <div class="data-title">橘星 (Star 1)</div>
          <div class="data-row">Pos: <span id="monitor-s1-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s1-vel">0.000, 0.000, 0.000</span></div>
        </div>
        <div class="data-card" style="border-left: 4px solid #66ccff;">
          <div class="data-title">藍星 (Star 2)</div>
          <div class="data-row">Pos: <span id="monitor-s2-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s2-vel">0.000, 0.000, 0.000</span></div>
        </div>
        <div class="data-card" style="border-left: 4px solid #fff0b3;">
          <div class="data-title">白星 (Star 3)</div>
          <div class="data-row">Pos: <span id="monitor-s3-pos">0.000, 0.000, 0.000</span></div>
          <div class="data-row">Vel: <span id="monitor-s3-vel">0.000, 0.000, 0.000</span></div>
        </div>
      </div>

    </div>

  </div>

  <!-- 核心應用程式腳本 -->
  <script type="module" src="./threebody.js"></script>

</body>

</html>
