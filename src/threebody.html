<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">
    <meta name="author" content="Starle">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starle OS — 三體動畫</title>

    <!-- 引入 CSS -->
    <link rel="stylesheet" href="./threebody.css">

    <!-- 引入 Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

</head>

<body>

    <div class="ui-container">

        <!-- 按鈕控制 -->
         <div class="control-container">

            <span class="pause-button">
                <span class="material-icons">pause</span>
            </span>

            <span class="setting-button">
                <span class="material-icons">settings</span>
            </span>

            <span class="home-button">
                <span class="material-icons">home</span>
            </span>

        </div>

        <!-- 控制面板 -->
        <div class="setting-panel">

            <!-- 面板分頁切換按鈕 -->
            <div class="tab-header">

                <span class="value-button show">
                    <span class="material-icons">tune</span>
                </span>

                <span class="solution-button">
                    <span class="material-icons">route</span>
                </span>

                <span class="analyze-button">
                    <span class="material-icons">radar</span>
                </span>

            </div>

            <!-- 參數調整分頁 -->
            <div class="value-tab active">
                <h3>參數調整</h3>
            </div>

            <!-- 特殊解分頁 -->
            <div class="solution-tab">
                <h3>特殊解</h3>
            </div>

            <!-- 數據監測分頁 -->
            <div class="analyze-tab">
                <h3>數據監測</h3>
            </div>

        </div>

    </div>

    <!-- 引入 JavaScript -->
    <script type="module" src="./threebody.js"></script>

</body>

</html>
